name: Keep services alive

on:
  schedule:
    - cron: "0 8 */3 * *" # every 3 days at 08:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase auth health
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/auth/v1/health" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase auth/health: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping Supabase DB
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/organizations?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase DB query: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping Upstash Redis
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "${{ secrets.UPSTASH_REDIS_REST_URL }}/ping" \
            -H "Authorization: Bearer ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}")
          echo "Upstash PING: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
